<!doctype html>
<!--
  free-splatter.cpp — ACCUMULATING reconstruction demo.
  Plays a sequence of splats produced by `free_splatter-cli --accumulate`: the
  cloud reconstructed from 2 photos, then 3, then 4, … as each new view is folded
  into one world (cross-run Sim(3) alignment). The input photos appear, one per
  step, in the top-right filmstrip — the newest highlighted. The WebGL splat
  renderer is the same EWA formulation as index.html (3DGS / antimatter15).

  Assets come from a manifest.json next to this page:
    { "steps": [ {"splat":"acc_2.splat","images":["f0.jpg","f1.jpg"],"n":2}, … ] }
  Each step's splat is the COMPLETE cloud at n frames; images lists every photo
  folded in so far (the last entry is the one just added).
-->
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>free-splatter.cpp — accumulating reconstruction</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0b0d10; overflow: hidden; font-family: ui-sans-serif, system-ui, sans-serif; }
  #gl { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  #panel {
    position: fixed; top: 16px; left: 16px; z-index: 10; width: 264px;
    background: rgba(16,19,24,.82); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 14px 16px;
    color: #e8eaed; font-size: 13px; line-height: 1.45; box-shadow: 0 8px 30px rgba(0,0,0,.4);
  }
  #panel h1 { font-size: 14px; font-weight: 650; letter-spacing: .2px; }
  #panel .sub { color: #8b93a1; font-size: 11.5px; margin-top: 2px; }
  #bar { height: 6px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; margin: 12px 0 8px; }
  #bar > div { height: 100%; width: 0; background: linear-gradient(90deg,#5b8cff,#8a5bff); transition: width .35s ease; }
  .stat { display: flex; justify-content: space-between; font-variant-numeric: tabular-nums; }
  .stat span:first-child { color: #8b93a1; }
  #status { margin-top: 8px; color: #9fd3a0; font-size: 11.5px; min-height: 1.2em; }
  #status.err { color: #ff8a8a; }
  #ctl { display: flex; gap: 6px; margin-top: 10px; }
  #ctl button { flex: 1; padding: 5px 8px; font-size: 12px; color: #e8eaed; cursor: pointer;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 8px; }
  #ctl button:hover { background: rgba(255,255,255,.12); }
  /* top-right filmstrip of the input photos, newest on top */
  #strip { position: fixed; top: 16px; right: 16px; z-index: 10; width: 168px;
    display: flex; flex-direction: column-reverse; gap: 8px; align-items: flex-end; }
  #strip .thumb { width: 156px; border-radius: 8px; overflow: hidden; position: relative;
    border: 1px solid rgba(255,255,255,.12); box-shadow: 0 6px 18px rgba(0,0,0,.45);
    opacity: .55; transform: scale(.92); transition: opacity .4s ease, transform .4s ease, filter .4s ease;
    filter: saturate(.8); background: #11141a; }
  #strip .thumb img { width: 100%; display: block; }
  #strip .thumb .tag { position: absolute; left: 6px; bottom: 5px; font-size: 10px; padding: 1px 6px;
    border-radius: 6px; background: rgba(0,0,0,.55); color: #cdd3dc; letter-spacing: .3px; }
  #strip .thumb.new { opacity: 1; transform: scale(1); filter: saturate(1.05);
    border-color: rgba(122,162,255,.9); box-shadow: 0 0 0 2px rgba(122,162,255,.5), 0 8px 22px rgba(0,0,0,.5); }
  #strip .thumb.new .tag { background: rgba(91,140,255,.92); color: #fff; }
  #hint { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 10;
    color: #6b7280; font-size: 11.5px; background: rgba(16,19,24,.7); padding: 6px 12px; border-radius: 8px; }
  /* prominent banner shown only on a labelled (consensus-fused) step */
  #banner { position: fixed; top: 18px; left: 50%; transform: translateX(-50%) translateY(-12px); z-index: 11;
    display: none; opacity: 0; transition: opacity .4s ease, transform .4s ease;
    padding: 9px 18px; border-radius: 999px; font-size: 13.5px; font-weight: 600; letter-spacing: .2px;
    color: #eafff0; background: linear-gradient(90deg, rgba(34,160,90,.95), rgba(46,120,210,.95));
    border: 1px solid rgba(255,255,255,.25); box-shadow: 0 8px 26px rgba(0,0,0,.5); }
  #banner.show { display: block; opacity: 1; transform: translateX(-50%) translateY(0); }
  #banner b { font-weight: 750; }
  /* scene switcher + video upload (server mode only) */
  #server-ui { display: none; margin-top: 10px; border-top: 1px solid rgba(255,255,255,.08); padding-top: 10px; }
  #server-ui .srow { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  #server-ui label { color: #8b93a1; font-size: 11.5px; }
  #server-ui select, #server-ui input[type=text] { flex: 1; min-width: 0; background: rgba(255,255,255,.06);
    color: #e8eaed; border: 1px solid rgba(255,255,255,.12); border-radius: 8px; padding: 4px 8px; font-size: 12px; }
  #server-ui .up { display: flex; flex-direction: column; gap: 6px; }
  #server-ui input[type=file] { font-size: 11px; color: #9aa3b2; }
  #server-ui #vid-go { padding: 5px 8px; font-size: 12px; color: #e8eaed; cursor: pointer;
    background: rgba(91,140,255,.18); border: 1px solid rgba(122,162,255,.5); border-radius: 8px; }
  #server-ui #vid-go:hover { background: rgba(91,140,255,.3); }
  #server-ui #vid-go:disabled { opacity: .5; cursor: default; }
  #vid-bar { height: 5px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; display: none; }
  #vid-bar > div { height: 100%; width: 0; background: linear-gradient(90deg,#5b8cff,#22a05a); transition: width .3s ease; }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="panel">
  <a href="/" style="display:inline-block;color:#7aa2ff;text-decoration:none;font-size:11.5px;margin-bottom:6px">‹ all demos</a>
  <h1>accumulating reconstruction</h1>
  <div class="sub">free-splatter.cpp — one world from a growing photo stream.</div>
  <div id="bar"><div></div></div>
  <div class="stat"><span>photos folded in</span><span id="s-frames">0</span></div>
  <div class="stat"><span>splats</span><span id="s-splats">0</span></div>
  <div class="stat"><span>fps</span><span id="s-fps">—</span></div>
  <div id="status">starting…</div>
  <div id="ctl"><button id="prev">‹ prev</button><button id="play">⏸ pause</button><button id="next">next ›</button></div>
  <label id="vibrow" style="display:flex;align-items:center;gap:8px;font-size:11.5px;color:#8b93a1;margin-top:10px;">
    <span>vibrance</span><input id="vibrance" type="range" min="0.6" max="2.2" step="0.05" value="1.45" style="flex:1;accent-color:#6f9bff"/>
  </label>
  <div id="server-ui">
    <div class="srow"><label>scene</label><select id="scene-sel"></select></div>
    <div class="up">
      <input type="file" id="vid" accept="video/*"/>
      <input type="text" id="vid-name" placeholder="scene name (a-z0-9-)"/>
      <button id="vid-go">＋ make scene from video</button>
      <div id="vid-bar"><div></div></div>
    </div>
  </div>
</div>
<div id="strip"></div>
<div id="banner"></div>
<div id="hint">drag to orbit · scroll to zoom · the cloud grows as each photo is added</div>

<script type="module">
const ROW = 32;                       // bytes per splat
const _q = new URLSearchParams(location.search);
// BASE is the dir holding manifest.json + splats. Set by ?dir= (standalone baked
// dir), else chosen at runtime: server mode = /scenes-assets/<scene>, standalone
// fallback = "." (manifest.json next to this page).
let BASE = (_q.get("dir") || "").replace(/\/$/, "");
let serverMode = false;
const STEP_MS = +(_q.get("ms") || 2600);
const START_STEP = parseInt(_q.get("start") || "0", 10);   // begin at this step
const AUTOPLAY = _q.get("auto") !== "0";                    // ?auto=0 = no advance
const $ = (id) => document.getElementById(id);
const setStatus = (t, err=false) => { const s=$("status"); s.textContent=t; s.classList.toggle("err",err); };

const canvas = $("gl");
const gl = canvas.getContext("webgl2", { antialias: false, premultipliedAlpha: true, alpha: false });
if (!gl) { setStatus("WebGL2 not available in this browser.", true); throw new Error("no webgl2"); }

// ---------- shaders (EWA splatting — identical to index.html) ----------
const VERT = `#version 300 es
precision highp float; precision highp int;
uniform highp usampler2D u_tex;
uniform mat4 u_proj, u_view;
uniform vec2 u_focal, u_viewport;
in vec2 a_corner;
in uint a_index;
out vec4 v_color;
out vec2 v_pos;
void main() {
  uint t = a_index * 2u;
  ivec2 wh = textureSize(u_tex, 0);
  uvec4 A = texelFetch(u_tex, ivec2(int(t % uint(wh.x)), int(t / uint(wh.x))), 0);
  uvec4 B = texelFetch(u_tex, ivec2(int((t+1u) % uint(wh.x)), int((t+1u) / uint(wh.x))), 0);
  vec3 center = uintBitsToFloat(A.xyz);
  vec3 scale  = vec3(uintBitsToFloat(A.w), uintBitsToFloat(B.x), uintBitsToFloat(B.y));
  uint rgba = B.z, rotp = B.w;
  v_color = vec4(float(rgba & 0xffu), float((rgba>>8)&0xffu), float((rgba>>16)&0xffu), float((rgba>>24)&0xffu)) / 255.0;
  vec4 q = (vec4(float(rotp&0xffu), float((rotp>>8)&0xffu), float((rotp>>16)&0xffu), float((rotp>>24)&0xffu)) - 128.0) / 128.0;
  q = normalize(q);
  float w=q.x, x=q.y, y=q.z, z=q.w;
  mat3 R = mat3(
    1.-2.*(y*y+z*z), 2.*(x*y+w*z),   2.*(x*z-w*y),
    2.*(x*y-w*z),    1.-2.*(x*x+z*z),2.*(y*z+w*x),
    2.*(x*z+w*y),    2.*(y*z-w*x),   1.-2.*(x*x+y*y));
  mat3 S = mat3(scale.x,0.,0., 0.,scale.y,0., 0.,0.,scale.z);
  mat3 M = R * S;
  mat3 cov3d = M * transpose(M);
  vec4 cam = u_view * vec4(center, 1.0);
  if (cam.z >= -0.2) { gl_Position = vec4(0.0,0.0,2.0,1.0); return; }
  vec4 clip = u_proj * cam;
  if (clip.w <= 0.0 || abs(clip.x) > 1.3*clip.w || abs(clip.y) > 1.3*clip.w) {
    gl_Position = vec4(0.0,0.0,2.0,1.0); return;
  }
  mat3 J = mat3(
    u_focal.x/cam.z, 0.0, -(u_focal.x*cam.x)/(cam.z*cam.z),
    0.0, -u_focal.y/cam.z, (u_focal.y*cam.y)/(cam.z*cam.z),
    0.0, 0.0, 0.0);
  mat3 W = transpose(mat3(u_view));
  mat3 T = W * J;
  mat3 cov2 = transpose(T) * cov3d * T;
  float a = cov2[0][0] + 0.3, b = cov2[0][1], c = cov2[1][1] + 0.3;
  float det = a*c - b*b;
  if (det <= 0.0) { gl_Position = vec4(0.0,0.0,2.0,1.0); return; }
  float mid = 0.5*(a+c);
  float rad = sqrt(max(0.0, mid*mid - det));
  float l1 = mid + rad;
  float l2 = max(mid - rad, 0.1);
  vec2 d = vec2(b, l1 - a);
  vec2 e1 = (dot(d,d) > 1e-9) ? normalize(d) : vec2(1.0, 0.0);
  float MAXPX = 0.3 * min(u_viewport.x, u_viewport.y);
  vec2 v1 = min(sqrt(2.0*l1), MAXPX) * e1;
  vec2 v2 = min(sqrt(2.0*l2), MAXPX) * vec2(e1.y, -e1.x);
  vec2 ndc = clip.xy / clip.w;
  vec2 offset = (a_corner.x*v1 + a_corner.y*v2) / u_viewport * 2.0;
  v_pos = a_corner;
  gl_Position = vec4(ndc + offset, clip.z/clip.w, 1.0);
}`;
const FRAG = `#version 300 es
precision highp float;
uniform float u_sat;     // saturation/vibrance boost (1.0 = as-decoded)
in vec4 v_color; in vec2 v_pos;
out vec4 o;
void main() {
  float p = -dot(v_pos, v_pos);
  if (p < -4.0) discard;
  float alpha = exp(p) * v_color.a;
  // SH-DC-only color is flat/desaturated; push each splat's color away from its
  // luma before the premultiplied blend (the blend itself also greys overlaps).
  vec3 rgb = v_color.rgb;
  float luma = dot(rgb, vec3(0.2126, 0.7152, 0.0722));
  rgb = clamp(mix(vec3(luma), rgb, u_sat), 0.0, 1.0);
  o = vec4(rgb * alpha, alpha);
}`;
function shader(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s)); return s; }
const prog = gl.createProgram();
gl.attachShader(prog, shader(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, shader(gl.FRAGMENT_SHADER, FRAG));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) { setStatus(gl.getProgramInfoLog(prog), true); throw new Error("link"); }
gl.useProgram(prog);

const quad = new Float32Array([-2,-2, 2,-2, 2,2, -2,-2, 2,2, -2,2]);
const quadBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf); gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
const aCorner = gl.getAttribLocation(prog, "a_corner");
gl.enableVertexAttribArray(aCorner); gl.vertexAttribPointer(aCorner, 2, gl.FLOAT, false, 0, 0);
const idxBuf = gl.createBuffer();
const aIndex = gl.getAttribLocation(prog, "a_index");
const tex = gl.createTexture();
const TEX_W = 2048;
const U = {
  proj: gl.getUniformLocation(prog,"u_proj"), view: gl.getUniformLocation(prog,"u_view"),
  focal: gl.getUniformLocation(prog,"u_focal"), viewport: gl.getUniformLocation(prog,"u_viewport"),
  sat: gl.getUniformLocation(prog,"u_sat"),
};
gl.uniform1i(gl.getUniformLocation(prog,"u_tex"), 0);
gl.disable(gl.DEPTH_TEST);
gl.enable(gl.BLEND);
gl.blendFuncSeparate(gl.ONE, gl.ONE_MINUS_SRC_ALPHA, gl.ONE, gl.ONE_MINUS_SRC_ALPHA);

// ---------- splat store ----------
let count = 0;
let positions = new Float32Array(0);
let texData = new Uint32Array(0);
function ensureCapacity(n){ if (n*8 <= texData.length) return;
  const cap = Math.max(n, Math.ceil(texData.length/8*1.5), 65536);
  const td = new Uint32Array(cap*8); td.set(texData); texData = td;
  const ps = new Float32Array(cap*3); ps.set(positions); positions = ps; }
function uploadTexture(){
  const rows = Math.max(1, Math.ceil((count*2)/TEX_W));
  const buf = new Uint32Array(TEX_W*rows*4);
  buf.set(texData.subarray(0, count*8));
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32UI, TEX_W, rows, 0, gl.RGBA_INTEGER, gl.UNSIGNED_INT, buf);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
}
// load a whole step splat, replacing the store
function setSplat(bytes){
  const n = Math.floor(bytes.byteLength / ROW);
  ensureCapacity(n);
  const f32 = new Float32Array(bytes.buffer, bytes.byteOffset, n*8);
  const u32 = new Uint32Array(bytes.buffer, bytes.byteOffset, n*8);
  texData.set(u32.subarray(0, n*8), 0);
  for (let i=0;i<n;i++){ positions[i*3]=f32[i*8]; positions[i*3+1]=f32[i*8+1]; positions[i*3+2]=f32[i*8+2]; }
  count = n;
  uploadTexture();
  // Seed an unsorted draw order so the cloud paints immediately; the depth-sort
  // worker refines it to proper back-to-front asynchronously. Without this there
  // is a blank gap each step until the worker returns (and a single headless
  // frame would capture nothing).
  const seq = new Uint32Array(count);
  for (let i=0;i<count;i++) seq[i]=i;
  gl.bindBuffer(gl.ARRAY_BUFFER, idxBuf); gl.bufferData(gl.ARRAY_BUFFER, seq, gl.DYNAMIC_DRAW);
  sortedIndex = seq; sortedCount = count;
  $("s-splats").textContent = count.toLocaleString();
  sortDirty = true;
}

// ---------- depth-sort worker (identical to index.html) ----------
const worker = new Worker(URL.createObjectURL(new Blob([`
let pos=null, n=0;
onmessage = (e) => {
  if (e.data.pos) { pos = e.data.pos; n = e.data.n; return; }
  if (!pos) return;
  const view = e.data.view, N = Math.min(n, e.data.n);
  const d = new Float32Array(N); let dmin=Infinity, dmax=-Infinity;
  for (let i=0;i<N;i++){ const z = view[2]*pos[i*3] + view[6]*pos[i*3+1] + view[10]*pos[i*3+2];
    d[i]=z; if(z<dmin)dmin=z; if(z>dmax)dmax=z; }
  const B=65536, cnt=new Uint32Array(B);
  const scale = dmax>dmin ? (B-1)/(dmax-dmin) : 0;
  const key=new Uint16Array(N);
  for(let i=0;i<N;i++){ let k=((d[i]-dmin)*scale)|0; k=k<0?0:k>65535?65535:k; key[i]=k; cnt[k]++; }
  for(let i=1;i<B;i++) cnt[i]+=cnt[i-1];
  const order=new Uint32Array(N);
  for(let i=N-1;i>=0;i--) order[--cnt[key[i]]]=i;
  postMessage({order, n:N}, [order.buffer]);
};
`], {type:"text/javascript"})));
let sortedIndex = new Uint32Array(0), sortedCount = 0, sorting = false, sortDirty = true;
worker.onmessage = (e) => { sortedIndex = e.data.order; sortedCount = e.data.n; sorting = false;
  gl.bindBuffer(gl.ARRAY_BUFFER, idxBuf); gl.bufferData(gl.ARRAY_BUFFER, sortedIndex, gl.DYNAMIC_DRAW); };
function requestSort(view){ if (sorting || count === 0) return; sorting = true;
  worker.postMessage({ pos: positions.slice(0, count*3), n: count }); worker.postMessage({ view, n: count }); }

// ---------- camera (orbit + zoom + gentle auto-spin) ----------
const _p = new URLSearchParams(location.search);
let target = [0,0,0], yaw = parseFloat(_p.get("yaw") ?? "0.0"), pitch = parseFloat(_p.get("pitch") ?? "0.05"), dist = 2.0;
let framed = false, autospin = _p.get("spin") !== "0";
function frameToData(mult){
  if (count === 0) return;
  let lo=[1e30,1e30,1e30], hi=[-1e30,-1e30,-1e30];
  for (let i=0;i<count;i++) for (let k=0;k<3;k++){ const v=positions[i*3+k]; if(v<lo[k])lo[k]=v; if(v>hi[k])hi[k]=v; }
  const diag = Math.hypot(hi[0]-lo[0], hi[1]-lo[1], hi[2]-lo[2]);
  target = [(lo[0]+hi[0])/2, (lo[1]+hi[1])/2, (lo[2]+hi[2])/2];
  dist = Math.max(0.5, (mult||1.0)*diag);
  framed = true; sortDirty = true;
}
let drag=false, lx=0, ly=0;
canvas.addEventListener("pointerdown", e => { drag=true; autospin=false; lx=e.clientX; ly=e.clientY; canvas.setPointerCapture(e.pointerId); });
canvas.addEventListener("pointerup",   () => drag=false);
canvas.addEventListener("pointermove", e => { if(!drag)return; yaw -= (e.clientX-lx)*0.005; pitch -= (e.clientY-ly)*0.005;
  pitch = Math.max(-1.5, Math.min(1.5, pitch)); lx=e.clientX; ly=e.clientY; sortDirty=true; });
canvas.addEventListener("wheel", e => { dist *= Math.exp(e.deltaY*0.001); dist=Math.max(0.2,Math.min(10,dist)); sortDirty=true; e.preventDefault(); }, {passive:false});

function perspective(fovy, aspect, n, f){ const t=1/Math.tan(fovy/2); return new Float32Array([t/aspect,0,0,0, 0,t,0,0, 0,0,(f+n)/(n-f),-1, 0,0,(2*f*n)/(n-f),0]); }
function lookAt(eye, c){ const z=norm(sub(eye,c)), x=norm(cross([0,1,0],z)), y=cross(z,x);
  return new Float32Array([x[0],y[0],z[0],0, x[1],y[1],z[1],0, x[2],y[2],z[2],0, -dot(x,eye),-dot(y,eye),-dot(z,eye),1]); }
const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]], dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
const cross=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];
const norm=(a)=>{const l=Math.hypot(...a)||1;return [a[0]/l,a[1]/l,a[2]/l];};
function resize(){ const dpr=Math.min(devicePixelRatio,2); canvas.width=innerWidth*dpr; canvas.height=innerHeight*dpr; gl.viewport(0,0,canvas.width,canvas.height); }
addEventListener("resize", resize); resize();

// vibrance (saturation) — cosmetic, demo-layer only; ?sat= overrides so headless/
// video renders match what you dialed in. Same control as reconstruct.html.
let saturation = parseFloat(_q.get("sat") ?? "1.45");
{ const vib = $("vibrance"); vib.value = saturation;
  vib.addEventListener("input", e => { saturation = +e.target.value; }); }

let frames=0, fpsT=performance.now(), lastT=performance.now();
function render(){
  const now=performance.now(), dt=(now-lastT)/1000; lastT=now;
  if (autospin && !drag) { yaw += dt*0.18; sortDirty=true; }
  const eye=[target[0]+dist*Math.sin(yaw)*Math.cos(pitch), target[1]+dist*Math.sin(pitch), target[2]+dist*Math.cos(yaw)*Math.cos(pitch)];
  const view=lookAt(eye,target);
  const aspect=canvas.width/canvas.height, fovy=1.0;
  const proj=perspective(fovy, aspect, 0.05, 100);
  const fy=canvas.height/(2*Math.tan(fovy/2)), fx=fy;
  if(sortDirty){ requestSort(view); sortDirty=false; }
  gl.clearColor(0.043,0.051,0.063,1); gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(prog);
  gl.uniformMatrix4fv(U.view,false,view); gl.uniformMatrix4fv(U.proj,false,proj);
  gl.uniform2f(U.focal,fx,fy); gl.uniform2f(U.viewport,canvas.width,canvas.height);
  gl.uniform1f(U.sat, saturation);
  gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf); gl.enableVertexAttribArray(aCorner); gl.vertexAttribPointer(aCorner,2,gl.FLOAT,false,0,0);
  if(sortedCount>0){
    gl.bindBuffer(gl.ARRAY_BUFFER,idxBuf); gl.enableVertexAttribArray(aIndex);
    gl.vertexAttribIPointer(aIndex,1,gl.UNSIGNED_INT,0,0); gl.vertexAttribDivisor(aIndex,1);
    gl.drawArraysInstanced(gl.TRIANGLES,0,6,sortedCount);
  }
  frames++; if(now-fpsT>500){ $("s-fps").textContent=Math.round(frames*1000/(now-fpsT)); frames=0; fpsT=now; }
  requestAnimationFrame(render);
}

// ---------- step playback ----------
let manifest=null, cur=-1, playing=AUTOPLAY, timer=null;
function renderStrip(step){
  const strip=$("strip"); strip.innerHTML="";
  const imgs=step.images||[];
  const start=Math.max(0, imgs.length-6);            // show at most the latest 6
  for (let i=start;i<imgs.length;i++){
    const d=document.createElement("div"); d.className="thumb"+(i===imgs.length-1?" new":"");
    const im=document.createElement("img"); im.src=`${BASE}/${imgs[i]}`; im.alt="view "+(i+1);
    const tag=document.createElement("div"); tag.className="tag"; tag.textContent=(i===imgs.length-1?"+ view ":"view ")+(i+1);
    d.appendChild(im); d.appendChild(tag); strip.appendChild(d);
  }
}
async function loadStep(i){
  if (!manifest || i<0 || i>=manifest.steps.length) return;
  cur=i; const step=manifest.steps[i];
  $("bar").firstElementChild.style.width = Math.round((i+1)/manifest.steps.length*100)+"%";
  $("s-frames").textContent = step.label ? "fused (" + step.n + ")" : step.n;
  const banner = $("banner");
  banner.classList.toggle("show", !!step.label);     // prominent only on the fused step
  setStatus(`folding view ${step.n} — ${step.splat}`);
  renderStrip(step);
  try {
    const resp = await fetch(`${BASE}/${step.splat}`, { cache: "no-store" });
    if(!resp.ok) throw new Error("HTTP "+resp.status+" for "+step.splat);
    const bytes = new Uint8Array(await resp.arrayBuffer());
    setSplat(bytes);
    // frame once (camera stays put as the cloud grows); but a tree-stages manifest
    // sets "reframe":true so each stage (very different extents) refits the view.
    if(!framed || (manifest && manifest.reframe)) frameToData(0.9);
    if (step.label) {
      banner.innerHTML = `<b>✓ ${step.label}</b> · ${count.toLocaleString()} splats`;
      setStatus(`${step.label} · ${count.toLocaleString()} splats`);
    } else {
      setStatus(`${step.n} photos · ${count.toLocaleString()} splats`);
    }
  } catch(err){ setStatus(err.message, true); console.error(err); }
}
function schedule(){ clearTimeout(timer); if(!playing) return;
  timer=setTimeout(async ()=>{ await loadStep((cur+1)%manifest.steps.length); schedule(); }, STEP_MS); }
$("prev").onclick = ()=>{ playing=false; $("play").textContent="▶ play"; loadStep(Math.max(0,cur-1)); };
$("next").onclick = ()=>{ playing=false; $("play").textContent="▶ play"; loadStep(Math.min(manifest.steps.length-1,cur+1)); };
$("play").onclick = ()=>{ playing=!playing; $("play").textContent = playing?"⏸ pause":"▶ play"; schedule(); };

// load the manifest at the current BASE and start (re-entrant: resets per scene).
async function loadManifestAndPlay(){
  clearTimeout(timer);
  manifest=null; cur=-1; framed=false;
  try {
    setStatus("loading manifest…");
    manifest = await (await fetch(`${BASE}/manifest.json`, { cache: "no-store" })).json();
    if(!manifest.steps || !manifest.steps.length) throw new Error("manifest has no steps");
    const s0 = Math.max(0, Math.min(manifest.steps.length-1, START_STEP));
    playing = AUTOPLAY;
    await loadStep(s0);
    $("play").textContent = playing ? "⏸ pause" : "▶ play";
    schedule();
  } catch(err){ setStatus("manifest.json not found — "+err.message, true); console.error(err); }
}

// ---------- scene switching (server mode) ----------
function populateScenes(scenes){
  const sel=$("scene-sel"); sel.innerHTML="";
  for (const sc of scenes){
    const o=document.createElement("option"); o.value=sc.name;
    o.textContent=`${sc.label} · ${sc.steps} steps`; sel.appendChild(o);
  }
}
async function selectScene(name){
  if(!name) return;
  $("scene-sel").value = name;
  BASE = "/scenes-assets/" + name;
  await loadManifestAndPlay();
}
$("scene-sel").onchange = () => selectScene($("scene-sel").value);

// ---------- upload a video -> bake a scene ----------
function slug(s){ return (s||"").toLowerCase().replace(/[^a-z0-9_-]+/g,"-").replace(/^-+|-+$/g,"").slice(0,48); }
$("vid").onchange = () => { if(!$("vid-name").value && $("vid").files[0])
  $("vid-name").value = slug($("vid").files[0].name.replace(/\.[^.]+$/,"")); };
$("vid-go").onclick = async () => {
  const f = $("vid").files[0];
  const nm = slug($("vid-name").value || (f && f.name.replace(/\.[^.]+$/,"")));
  if(!f){ setStatus("pick a video first", true); return; }
  if(!nm){ setStatus("enter a scene name", true); return; }
  const fd = new FormData(); fd.append("video", f); fd.append("name", nm);
  const go=$("vid-go"), bar=$("vid-bar"); go.disabled=true; bar.style.display="block"; bar.firstElementChild.style.width="0%";
  setStatus(`uploading ${f.name}…`);
  let resp;
  try { resp = await fetch("/api/scene/from-video", { method:"POST", body:fd }); }
  catch(e){ setStatus("upload failed: "+e.message, true); go.disabled=false; return; }
  if(!resp.ok){ setStatus("rejected: "+(await resp.text()).trim(), true); go.disabled=false; bar.style.display="none"; return; }
  const { job } = await resp.json();
  const poll = setInterval(async () => {
    let st; try { st = await (await fetch("/api/scene/status/"+encodeURIComponent(job), {cache:"no-store"})).json(); }
    catch(e){ return; }
    if(st.state==="running"){
      setStatus(`baking ${nm}: ${st.done}/${st.total} frames · ${st.kept} kept`);
      bar.firstElementChild.style.width = st.total ? Math.round(st.done/st.total*100)+"%" : "0%";
    } else if(st.state==="done"){
      clearInterval(poll); go.disabled=false; bar.firstElementChild.style.width="100%";
      const scenes=(await (await fetch("/api/scenes",{cache:"no-store"})).json()).scenes;
      populateScenes(scenes); await selectScene(st.scene);
      setTimeout(()=>{ bar.style.display="none"; }, 1200);
    } else if(st.state==="error"){
      clearInterval(poll); go.disabled=false; bar.style.display="none";
      setStatus("bake failed: "+st.error, true);
    }
  }, 1200);
};

// ---------- init: server mode (scene list) vs standalone (?dir / local manifest) ----------
(async function init(){
  requestAnimationFrame(render);
  if (BASE) { await loadManifestAndPlay(); return; }   // ?dir= : explicit standalone dir
  let scenes = null;
  try { const r = await fetch("/api/scenes", { cache:"no-store" }); if(r.ok) scenes = (await r.json()).scenes; } catch(e){}
  if (scenes !== null) {                                // served by the Go app
    serverMode = true;
    $("server-ui").style.display = "block";
    populateScenes(scenes);
    if (scenes.length) {
      const want = _q.get("scene");
      const pick = scenes.find(s => s.name === want) ? want : scenes[0].name;
      await selectScene(pick);
    } else setStatus("no scenes yet — upload a video to make one");
    return;
  }
  BASE = ".";                                           // standalone baked dir: manifest.json next to this page
  await loadManifestAndPlay();
})();
</script>
